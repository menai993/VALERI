name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: valeri
          POSTGRES_PASSWORD: valeri
          POSTGRES_DB: valeri_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://valeri:valeri@localhost:5432/valeri_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: Alembic migrations
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -v

  web:
    name: Web — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
