# Static serving of the VALERI web bundle. Caddy sits in front and proxies
# /api to the FastAPI service; this server only serves the SPA.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed build assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
