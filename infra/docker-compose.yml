# VALERI — on-prem stack (docs/architecture.md §1)
#
#   cp .env.example .env   (fill in secrets)
#   docker compose up --build
#
# Only caddy publishes ports; everything else stays on the internal network.

name: valeri

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: ${APP_ENV:-development}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      PII_SALT: ${PII_SALT}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ../apps/api
      target: dev
    restart: unless-stopped
    # The scheduled-jobs process (M4 scans · M11 audit · M13 investigation poll).
    # Overrides the api entrypoint so only the api container runs migrations;
    # `python -c` works with both dev (source) and dist (compiled) images.
    entrypoint: ["python", "-c", "from valeri_api.worker import main; main()"]
    command: []
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: ${APP_ENV:-development}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      PII_SALT: ${PII_SALT}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set in .env}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set in .env}
      # M12: tier→model mapping is pure config (defaults match .env.example).
      LLM_TIER1_MODEL: ${LLM_TIER1_MODEL:-anthropic/claude-haiku-4-5-20251001}
      LLM_TIER2_MODEL: ${LLM_TIER2_MODEL:-anthropic/claude-sonnet-4-6}
      LLM_TIER2_STRONG_MODEL: ${LLM_TIER2_STRONG_MODEL:-anthropic/claude-opus-4-8}
    volumes:
      - ./litellm.config.yaml:/etc/litellm/config.yaml:ro

  backup:
    # Scheduled pg_dump (M14). Runs backup.sh once a day at BACKUP_HOUR; dumps land
    # in the pg_backups volume and are pruned after BACKUP_RETENTION_DAYS. Copy the
    # dumps off-host regularly — see docs/RUNBOOK.md.
    image: postgres:16
    restart: unless-stopped
    environment:
      PGHOST: db
      PGPORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_HOUR: ${BACKUP_HOUR:-02}
    volumes:
      - ./backup:/scripts:ro
      - pg_backups:/backups
    entrypoint: ["sh", "-c"]
    # A tiny scheduler: poll the clock; when the hour matches BACKUP_HOUR, dump,
    # then sleep an hour so it runs once per day.
    command:
      - |
        echo "[backup] service started; daily backup at ${BACKUP_HOUR:-02}:00";
        while true; do
          if [ "$$(date +%H)" = "${BACKUP_HOUR:-02}" ]; then
            sh /scripts/backup.sh || echo "[backup] run failed";
            sleep 3600;
          fi;
          sleep 1800;
        done
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  pgdata:
  pg_backups:
  caddy_data:
  caddy_config:
