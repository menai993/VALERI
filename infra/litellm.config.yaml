# VALERI LLM gateway — LiteLLM routing (docs/architecture.md §4).
#
# All tiers are hosted Claude models via the Anthropic API; the key comes from
# the environment (never from this file). The app talks OpenAI-compatible
# protocol to this gateway and addresses models by tier ALIAS only (tier1 /
# tier2 / tier2_strong). The alias→model mapping reads LLM_TIER*_MODEL from the
# environment (.env), so swapping a tier's underlying model — e.g. Sonnet↔Opus —
# is config-only: edit .env and restart the gateway (M12).

model_list:
  # Tier-1 — small/fast/cheap: narration, intent, NL→rule, simple Q&A
  - model_name: tier1
    litellm_params:
      model: os.environ/LLM_TIER1_MODEL
      api_key: os.environ/ANTHROPIC_API_KEY

  # Tier-2 — strong default: over-suppression audits, investigations (M13)
  - model_name: tier2
    litellm_params:
      model: os.environ/LLM_TIER2_MODEL
      api_key: os.environ/ANTHROPIC_API_KEY

  # Tier-2 strong — hardest investigation synthesis only
  - model_name: tier2_strong
    litellm_params:
      model: os.environ/LLM_TIER2_STRONG_MODEL
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
